<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Sistemas de Nacionalidade</h1>
    Em qual país você nasceu? <input type="text" name="txtpais" id="txtpais">
        <input type="button" value="Verificar" onclick="Verificar()">
            <div id="res">

            </div>
            <script>
                function Verificar() {
                   var txtpais = window.document.querySelector('input#txtpais')
                   var res = window.document.querySelector('div#res')
                   var p = txtpais.value
                        res.innerHTML = `Vivendo em: <strong> ${p} </strong>`
                            if(p == 'Brasil' || p == 'BRASIL' || p == 'brasileiro' 
                            || p == 'BRASILEIRO' || p == 'Brasileiro' 
                            || p == 'brasil' || p == 'BRASIL' || p == 'BRASIL' || p == 'Brasil' 
                            || p == 'brasil'){
                        res.innerHTML += '<p>Você é <strong>Brasileiro!</strong></p>'
                            }else{
                        res.innerHTML += '<p>Você é <strong>Estrangeiro!</strong></p>'
                            }
                        
                }
            </script>
        </body>
</html>
