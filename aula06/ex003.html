<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa...</title>
    <style>
        body{
            background-color: rgb(78, 169, 139); /* comemtário no css*/
            color: brown;
            font: normal 20pt Arial;
        }
        h1{
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1> <!-- comentário no html -->
    <p>Já me livrei da maldição</p>
<script>
    var num1 = Number.parseInt(window.prompt('Digite um número: '))
    var num2 = Number.parseInt(window.prompt('Digite outro número: '))
    var soma = num1 + num2
    window.alert(`A soma entre ${num1} e ${num2} é: ${soma}`) 

    // number + number = adição 
    // string + string = concatenação
    
</script>

</body>
</html>
